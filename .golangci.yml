linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused

issues:
  # Exclude errcheck for deferred cleanup, test helpers, and cases where
  # errors are intentionally ignored (e.g., fmt.Fprintln to stderr).
  exclude:
    - "Error return value of `fmt\\.Fprint(ln)?` is not checked"
    - "Error return value of `(os\\.Remove|os\\.RemoveAll|os\\.Chmod|os\\.WriteFile)` is not checked"
    - "Error return value of `.*\\.Close` is not checked"
    - "Error return value of `store\\.DeleteRecord` is not checked"
    - "Error return value of `conn\\.(Close|Exec)` is not checked"
    - "Error return value of `rows\\.(Close|Next)` is not checked"
    - "Error return value of `.*\\.Run` is not checked"
    - "Error return value of `.*\\.Upsert` is not checked"
    - "Error return value of `_.*` is not checked"

run:
  timeout: 5m
